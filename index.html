<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI跳绳计数器 Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .logo span { font-size: 48px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; text-align: center; }
        p { font-size: 16px; opacity: 0.9; text-align: center; margin-bottom: 32px; }
        .btn {
            background: white;
            color: #667eea;
            padding: 16px 48px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,255,255,0.4); }
        .btn:active { transform: scale(0.98); }
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 40px;
            width: 100%;
            max-width: 320px;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        .feature span { font-size: 24px; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="logo">
        <span>🚴</span>
    </div>
    <h1>AI跳绳计数器 Pro</h1>
    <p>基于AI姿态识别的专业跳绳计数应用</p>
    
    <a href="mobile_local.html" class="btn">开始使用</a>
    
    <div class="features">
        <div class="feature">
            <span>🎯</span>
            精准计数
        </div>
        <div class="feature">
            <span>💬</span>
            语音播报
        </div>
        <div class="feature">
            <span>📊</span>
            数据统计
        </div>
        <div class="feature">
            <span>📱</span>
            手机专用
        </div>
    </div>
</body>
</html>
